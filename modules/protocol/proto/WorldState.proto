syntax = "proto3";

package mmo;

message EntityPosition {
    int32 id = 1;
    float x = 2;
    float y = 3;
    float z = 4;
}

message SpawnEntity {
    int32 id = 1;
}

message DespawnEntity {
    int32 id = 1;
}

message WorldStateMessage {
    uint32 frame_idx = 1;

    repeated SpawnEntity spawns = 2;

    repeated EntityPosition entities = 3;

    repeated DespawnEntity despawns = 4;
}
